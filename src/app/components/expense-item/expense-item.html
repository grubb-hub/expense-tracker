<div class="card expense-card my-2 mx-auto w-50">
  <div class="card-body d-flex justify-content-between align-items-center">
    <!-- LEFT SIDE -->
    <div>
      <h5 class="mb-1">{{ expense().title }}</h5>

      <p class="mb-0">
        Amount:
        <strong [class.text-danger]="isHighExpense()">${{ expense().amount }}</strong>

        Category:
        <span [style.background-color]="categoryColor()" [style.color]="'white'">
          {{ expense().category }}
        </span>
      </p>
    </div>

    <!-- RIGHT SIDE BUTTONS -->
    <div class="d-flex gap-2">
      <button class="btn btn-sm edit-button" routerLink="/edit">Edit</button>

      <button class="btn btn-sm btn-danger" (click)="onDeleteTask()">Delete</button>
    </div>
  </div>
</div>
